version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pwl-filament-app 
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www:cached  
    networks:
      - pwl-filament-network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: pwl-filament-nginx 
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf  
    networks:
      - pwl-filament-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: pwl-filament-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pwl_filament
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: pwl_user
      MYSQL_PASSWORD: pwl_password
    ports:
      - "3307:3306"
    volumes:
      - filament-dbdata:/var/lib/mysql
    networks:
      - pwl-filament-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  pwl-filament-network:
    driver: bridge

volumes:
  filament-dbdata:
    driver: local